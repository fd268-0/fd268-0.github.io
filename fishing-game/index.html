<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fish</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #eee;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-image: url('https://www.onlygfx.com/wp-content/uploads/2021/04/white-triangle-pattern-seamless-background-5.jpg');
        backdrop-filter: brightness(0.5);
    }

    canvas {
        background-color: #fff;
        border: 2px solid #fff;
    }
    </style> 
  </head>
  <body>
    <script>
      window.addEventListener('load', function() {
        document.querySelectorAll("*").forEach(e=>{e.style["touch-action"]="manipulation"}),new MutationObserver(e=>{e.forEach(function(e){for(var o=0;o<e.addedNodes.length;o++)e.addedNodes[o].style["touch-action"]="manipulation"})}).observe(document.body,{childList:!0,subtree:!0});
        // draw
        var canvas = document.getElementById('gameCanvas')
        var ctx = canvas.getContext('2d')
        var min = Math.min(window.innerWidth, window.innerHeight)

        function resizeCanvas() {
          canvas = document.getElementById('gameCanvas')
          ctx = canvas.getContext('2d')
          min = Math.min(window.innerWidth-15, window.innerHeight-15)
          canvas.width = min
          canvas.height = min
          ctx.scale((min/500),(min/500))
        }

        resizeCanvas()
        

        window.addEventListener('resize', resizeCanvas);

        class Text {
          constructor(x, y, color, text, font, outlinedSize, drawsOutlined) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.text = text;
            this.font = font;
            this.outlinedSize = outlinedSize;
          }

          draw() {
            if (this.drawsOutlined) {
              ctx.font = this.font;
              ctx.strokeStyle = this.color;
              ctx.lineWidth = this.outlinedSize;
              ctx.strokeText(this.text, this.x, this.y);
            } else {
              ctx.font = this.font;
              ctx.fillStyle = this.color;
              ctx.fillText(this.text, this.x, this.y);
            }
          }
        }

        class Item {
          constructor(x, y, width, height, color, outlinedSize, drawsOutlined, touchable, touchableCallback, param) {
            this.x = x;
            this.y = y;
            this.width = width;
            this.height = height;
            this.color = color;

            // for players (optional)
            this.velo = 0;
            this.wanted = 250;
            this.speed = 0.07;
            this.active = false;

            var isle = isles[level.iChosen-1]

            this.progressSpeed = 1.3-(Math.random()*0.6*isle.dif); 
            this.barBounce = 8-(Math.random()*5); // 5
            this.fishChangeBoundary = 1+(Math.random()*7*isle.dif); // 1
            this.barMovementSpeed = 1; // 1
            this.fishEdgeBounce = 2+(Math.random()*3.5*isle.dif); // 4
            this.speedMulti = 0.5+(Math.random()*isle.dif); // 1
            this.fishMovementMax = 40+(Math.random()*70*isle.dif); // 70

            

            this.valueMulti = 2.5
            this.bonus = 0

            if (touchable) {
              this.touchable = true
              this.touchableColor = touchable
              this.normalColor = color
              this.callback = touchableCallback
              this.param = param
            }
          }



          getDifficulty() {
            var progressSpeedDifficulty = 1/this.progressSpeed
            var barBounceDifficulty = 5/this.barBounce
            var fishChangeBoundaryDifficulty = (Math.pow(this.fishChangeBoundary, 0.65)-1)
            var barMovementSpeedDifficulty = 0-(this.barMovementSpeed-1)*5
            var fishEdgeBounceDifficulty = (Math.pow(this.fishEdgeBounce, 1.5)/5)-2.63
            var speedMultiDifficulty = Math.pow(this.speedMulti,2)
            var fishMovementMaxDifficulty = Math.pow(((this.fishMovementMax-70)/70), 4)
            var widthDifficulty = (0-(this.width-125))/50

            var difficulty = Math.pow((((progressSpeedDifficulty+barBounceDifficulty+fishChangeBoundaryDifficulty+barMovementSpeedDifficulty+fishEdgeBounceDifficulty+speedMultiDifficulty+fishMovementMaxDifficulty+widthDifficulty) * isles[level.iChosen-1].money) + 1), 1.5)

            return difficulty
          }

          draw() {
            if (this.drawsOutlined) {
              ctx.strokeStyle = this.color;
              ctx.strokeRect(this.x, this.y, this.width, this.height);
            } else {
              ctx.fillStyle = this.color;
              ctx.fillRect(this.x, this.y, this.width, this.height);
            }
          }
        }

        class Rod {
          constructor(name, price, recipe, buffs) {
              this.buffs = buffs
              this.name = name
              this.price = price
              this.recipe = recipe
            }

            buy() {
              
            }
        }

        var rodShop = new Object()
        rodShop.br = new Rod("Broken Rod", 0, {}, {})
        rodShop.sr = new Rod("Sturdy Rod", 75, {}, {barSize: 35})

        class Isle {
            constructor(name, xpRequiredToLvUp, difficultyMulti, mnMulti) {
              this.xpRequired = xpRequiredToLvUp
              this.name = name
              this.dif = difficultyMulti
              this.money = mnMulti
            }
          }

          var isles = new Array()
          isles.push(new Isle("Beginner's Pond", 70, 0.5, 1.2))
          isles.push(new Isle("Grasslands Isle", 250, 0.8, 1.1))
          isles.push(new Isle("Cove Edge", 500, 0.9, 1))
          isles.push(new Isle("Orion Outcrop", 800, 1, 1))
          isles.push(new Isle("Forestbay", 1200, 1.1, 1))
          isles.push(new Isle("Volcanic Vents", 1700, 1.2, 1))
          isles.push(new Isle("Galactic Gates", 2500, 1.3, 1))
          isles.push(new Isle("Underground Unknown", 4000, 1.3, 1))
          isles.push(new Isle("Cursed Passageway", 6000, 1.4, 1))
          isles.push(new Isle("Secret Castaway", 9000, 1.5, 1))

        function sleep(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        }

        var currency = 0
        if (localStorage.getItem("currency")) {
          currency = Number(localStorage.getItem("currency"))
        }
        if (Number.isNaN(currency)) {
          currency = 0
        }
        var bestCatch = 0
        if (localStorage.getItem("bestCatch")) {
          bestCatch = Number(localStorage.getItem("bestCatch"))
        }
        if (Number.isNaN(bestCatch)) {
          bestCatch = 0
        }
        var level = new Object()
        level.xp = 0
        level.isle = 1
        level.iChosen = 1
        if (localStorage.getItem("level")) {
          level = JSON.parse(localStorage.getItem("level"))
        }

        var rods = new Array()
        if (localStorage.getItem("rods")) {
          rods = JSON.parse(localStorage.getItem("rods"))
        }
        rods.push("br")

        var equippedRod = "br"
        if (localStorage.getItem("equippedRod")) {
          equippedRod = localStorage.getItem("equippedRod")
        }


        var streak = 0
        var drawObjects = new Object()

        window.addEventListener('beforeunload', function (e) {
          localStorage.setItem("currency", currency)
          localStorage.setItem("bestCatch", bestCatch)
          localStorage.setItem("level", JSON.stringify(level))
          localStorage.setItem("rods", JSON.stringify(rods))
          localStorage.setItem("equippedRod", equippedRod)
        })


        function clear() {
          const canvas = document.getElementById('gameCanvas')
          ctx.clearRect(0,0,canvas.width,canvas.height)
        }

        function draw(timestamp) {
          requestAnimationFrame(draw);
          clear()
          for (var i = 0; i < Object.keys(drawObjects).length; i++) {
            drawObjects[Object.keys(drawObjects)[i]].draw()
          }
        }

        draw()

        rndStart()

        function rndStart() {
          drawObjects.bg = new Item(0,0,500,60, "#bbbbbb")
          drawObjects.currency = new Text(10,30,"#444444",`✦`,"bold 25px monospace")
          drawObjects.currencyBest = new Text(40,45,"#444444",`Best Catch: ✦`,"bold 13px monospace")

          drawObjects.buttonFish = new Item(0, 350, 500, 150, "#eeffee", 0, false, "#eeeeee", "initFish", "")
          drawObjects.buttonText = new Text(220,430,"#33aa33", "ITEM","25px monospace")

          drawObjects.buttonRods = new Item(0, 60, 250, 240, "#777777", 0, false, "#444444", "openRodMenu", "")
          drawObjects.buttonRodsText = new Text(95,185,"#333333", "RODS","25px monospace")
          drawObjects.buttonBaits = new Item(250, 60, 250, 120, "#555555", 0, false, "#222222", "openRodMenu", "")
          drawObjects.buttonBaitsText = new Text(345,125,"#111111", "BAIT","25px monospace")
          drawObjects.buttonFishs = new Item(250, 180, 250, 120, "#666666", 0, false, "#333333", "openRodMenu", "")
          drawObjects.buttonFishsText = new Text(345,245,"#222222", "ITEM","25px monospace")

          
          drawObjects.buttonLevel = new Item(0, 300, 500, 50, "#ccffff")
          drawObjects.buttonLevelBackground = new Item(10, 330, 480, 10, "#aadddd")
          drawObjects.buttonLevelActive = new Item(10, 330, 48, 10, "#55aaaa")
          drawObjects.buttonLevelText = new Text(10,325,"#339999", "Isle 1","bold 20px monospace")
          drawObjects.buttonDifText = new Text(405,327,"#993333", "x","bold 10px monospace")

          drawObjects.buttonRodsText = new Text(10,45,"#333333", "WIP","13px monospace")
        }

        // end draw
        // game

        const pressedKeys = new Object();

        window.addEventListener("keydown", (event) => {
          pressedKeys[event.code] = true;
        });
        window.addEventListener("keyup", (event) => {
          pressedKeys[event.code] = false;
        });

        document.addEventListener('pointerdown', function(event) {
          const rect = canvas.getBoundingClientRect();
          const mouseX = event.clientX - rect.left;
          const mouseY = event.clientY - rect.top;

          const transformMatrix = ctx.getTransform();
          var sx = transformMatrix.a;
          var sy = transformMatrix.d;

          px = mouseX/sx
          py = mouseY/sy
          pressedKeys["MouseDown"] = true;
          hover(true)
        });

        document.addEventListener('pointerup', function(event) {
          pressedKeys["MouseDown"] = false;
        });

        var px = 0
        var py = 0

        document.addEventListener('pointermove', function(event) {
          const rect = canvas.getBoundingClientRect();
          const mouseX = event.clientX - rect.left;
          const mouseY = event.clientY - rect.top;

          const transformMatrix = ctx.getTransform();
          var sx = transformMatrix.a;
          var sy = transformMatrix.d;

          px = mouseX/sx
          py = mouseY/sy
        });

        var de = 0

        function testing() {
          console.log("test")
        }

        function barInit() {
          var size = 75+(Math.random()*100)
          drawObjects.barBackground = new Item(50, 422.5, 400, 20, "#888888")
          drawObjects.barActive = new Item(250-(size/2), 420, size, 25, "#000000")
          drawObjects.progressBackground = new Item(100, 460, 300, 10, "#888888")
          drawObjects.progressActive = new Item(100, 460, 0, 10, "#333333")
          drawObjects.fishLocation = new Item(250, 417.5, 5, 30, "#333333")

          drawObjects.barText = new Text(50,400,"#444444",`✦`,"bold 15px monospace")
          drawObjects.barMulti = new Text(50,383,"#000044",`✦`,"15px monospace")

          drawObjects.buttonFish.callback = ""
          drawObjects.buttonFish.touchableColor = "#ffffff"
          drawObjects.buttonFish.normalColor = "#ffffff"

          drawObjects.buttonText.color = "#ffffff"
        }

        function del() {
          delete drawObjects.barBackground
          delete drawObjects.barActive
          delete drawObjects.progressBackground
          delete drawObjects.progressActive
          delete drawObjects.fishLocation
          delete drawObjects.barText
          delete drawObjects.barMulti

          drawObjects.buttonFish.callback = "initFish"
          drawObjects.buttonFish.touchableColor = "#eeeeee"
          drawObjects.buttonFish.normalColor = "#eeffee"

          drawObjects.buttonText.color = "#33aa33"
        }

        function executeFunctionByName(functionName, context, args) {
          var args = Array.prototype.slice.call(arguments, 2);
          var namespaces = functionName.split(".");
          var func = namespaces.pop();
          for(var i = 0; i < namespaces.length; i++) {
            context = context[namespaces[i]];
          }
          return context[func].apply(context, args);
        }

        async function barEnd() {
          await sleep(10)
          streak = 0
          del()
        }

        async function barGreen() {
          drawObjects.barActive.active = false
          var x = 0
          var y = 48
          var dei = de
          var mult = drawObjects.barActive.valueMulti

          level.xp += dei*(Math.min(1,(streak/15))+1)

          var curReq = currency+(dei*mult)
          var bst = (dei*mult)
          streak += 1
          while (x < 175) {
            await sleep(10)
            y += (255-y) * 0.07
            de += ((dei*mult)-de) * 0.07
            drawObjects.barActive.valueMulti += (1-drawObjects.barActive.valueMulti) * 0.07
            drawObjects.progressActive.color = `rgb(48,${y},48)`
            currency += (curReq-currency) * 0.07
            if (bst > bestCatch) {
              bestCatch += (bst-bestCatch) * 0.07
            }
            x += 1
          }
          del()
        }

        async function render() {
          while (true) {
            await sleep(16)
            frame()
          }
        }

        function hover(doPress) {
          for (var i = 0; i < Object.keys(drawObjects).length; i++) {
            var item = drawObjects[Object.keys(drawObjects)[i]]
            if (item.touchable) {
              if (px > item.x && px < item.x+item.width && py > item.y && py < item.y+item.height) {
                item.color = item.touchableColor
                if (doPress) {
                  var callback = item.callback
                  var param = item.param
                  if (callback == "initFish") {
                    init()
                  }
                }
              } else {
                item.color = item.normalColor
              }
            }
          }
        }

        function frame() {
          hover()
          if (streak > 0) {
            drawObjects.buttonText.text = `⁕${streak.toString().padStart(3, "0")}`
          } else {
            drawObjects.buttonText.text = `FISH`
          }
          drawObjects.buttonDifText.text = `Difficulty x${Math.round(isles[level.iChosen-1].dif*10)/10}`
          drawObjects.buttonLevelText.text = `Isle ${level.iChosen} • ${isles[level.iChosen-1].name}`
          drawObjects.buttonLevelActive.width += Math.min(480, (((level.xp/isles[level.iChosen-1].xpRequired)*480)-drawObjects.buttonLevelActive.width) * 0.07)
          if (level.xp > isles[level.iChosen-1].xpRequired && isles.length > level.iChosen) {
            level.xp -= isles[level.iChosen-1].xpRequired
            level.isle += 1
            level.iChosen = level.isle
          }
          drawObjects.currency.text = `✦${Math.floor(currency*100)/100}`
          drawObjects.currencyBest.text = `Best Catch: ✦${Math.floor(bestCatch*100)/100}`
          if (drawObjects.barActive) {
            var activeBar = drawObjects.barActive
            drawObjects.barText.text = `✦${Math.floor(de*100)/100}`
            drawObjects.barText.color = `rgb(${Math.min(255,64*(de/4))},${Math.max(64,Math.min(255,64*(de/16)))},64)`
            drawObjects.barMulti.text = `x${Math.floor(activeBar.valueMulti*100)/100}`
            drawObjects.barMulti.color = `rgb(64,${Math.min(255,48*(activeBar.valueMulti))},${Math.min(255,128*(activeBar.valueMulti))})`
            if (activeBar.active == false && streak > 0 && drawObjects.progressActive.width < 290) {
              drawObjects.barMulti.color = `rgb(${Math.min(255,64*(streak/3+1))},${Math.min(255,64*(streak/6+1))},64)`
              drawObjects.barMulti.text = `x${Math.floor(activeBar.valueMulti*100)/100} ⁕${streak}`
            }
            if (activeBar.active) {
              if (pressedKeys["MouseDown"] == true) {
                activeBar.velo -= 0.06*activeBar.barMovementSpeed
                if (activeBar.vel > 0) {
                  activeBar.velo -= 0.06*activeBar.barMovementSpeed
                }
              } else {
                activeBar.velo += 0.06*activeBar.barMovementSpeed
                if (activeBar.vel < 0) {
                  activeBar.velo += 0.06*activeBar.barMovementSpeed
                }
              }

             

              if (activeBar.x < drawObjects.fishLocation.x+2.5 && activeBar.x+activeBar.width > drawObjects.fishLocation.x+2.5) {
                activeBar.color = "#000000"
                drawObjects.progressActive.width += 0.5*activeBar.progressSpeed
              } else {
                activeBar.color = "#444444"
                drawObjects.progressActive.width -= 0.5*1.5
                if (activeBar.valueMulti > 2.01+activeBar.bonus) {
                  activeBar.valueMulti -= 0.5-Math.min(0.2,(streak/100))
                }

                if (activeBar.valueMulti < 1.5+activeBar.bonus) {
                   activeBar.valueMulti -= 0.01/(1/(activeBar.valueMulti-0.5+activeBar.bonus)*(1/(activeBar.valueMulti-0.5+activeBar.bonus))+3)
                } else {
                  activeBar.valueMulti -= 0.01
                }
                if (activeBar.valueMulti <= 1) {
                  activeBar.valueMulti = 1
                }
              }

              if (drawObjects.progressActive.width < 0) {
                barEnd()
              }

              if (drawObjects.progressActive.width > 300) {
                barGreen()
              }

              activeBar.x -= activeBar.velo
              if (activeBar.x < 50) {
                activeBar.x = 50
                activeBar.velo = (0-(activeBar.velo/activeBar.barBounce))
              }
              if (activeBar.x > 450-activeBar.width) {
                activeBar.x = 450-activeBar.width
                activeBar.velo = (0-(activeBar.velo/activeBar.barBounce))
              }

              drawObjects.fishLocation.x += (drawObjects.fishLocation.wanted-drawObjects.fishLocation.x) * (activeBar.speed)

              if (Math.round(drawObjects.fishLocation.x) > Math.round(drawObjects.fishLocation.wanted-activeBar.fishChangeBoundary) && Math.round(drawObjects.fishLocation.x) < Math.round(drawObjects.fishLocation.wanted+activeBar.fishChangeBoundary)) {
                drawObjects.fishLocation.wanted += (Math.random() * activeBar.fishMovementMax) * 2 - activeBar.fishMovementMax
                if (drawObjects.fishLocation.wanted < 50) {
                  drawObjects.fishLocation.wanted += (50-drawObjects.fishLocation.wanted) * activeBar.fishEdgeBounce
                  if (drawObjects.fishLocation.wanted > 400) {
                    drawObjects.fishLocation.wanted = 400+Math.random()*50
                  }
                }
                if (drawObjects.fishLocation.wanted > 450) {
                  drawObjects.fishLocation.wanted -= (drawObjects.fishLocation.wanted-450) * activeBar.fishEdgeBounce
                  if (drawObjects.fishLocation.wanted < 100) {
                    drawObjects.fishLocation.wanted = 100-Math.random()*50
                  }
                }
                activeBar.speed = (0.05 + Math.random() * 0.08)*activeBar.speedMulti
              }
            }
          }
        }

        render()

        async function init() {
          barInit()
          var wantedBonus = Math.min(1.5,streak/6)
          var x = 0
          de = drawObjects.barActive.getDifficulty()
          
          var rod = rodShop[equippedRod]

            for (var i = 0; i < Object.keys(rod.buffs).length; i++) {
              var stat = rod.buffs[Object.keys(rod.buffs)[i]]
              if (drawObjects.barActive[i]) {
                drawObjects.barActive[i] += stat
              }
              console.log(Object.keys(rod.buffs)[i])
              if (Object.keys(rod.buffs)[i] == "deM") {
                de *= stat
              }
              if (Object.keys(rod.buffs)[i] == "deP") {
                de += stat
              }
              if (Object.keys(rod.buffs)[i] == "barSize") {
                drawObjects.barActive.width += stat
                drawObjects.barActive.x -= stat/2
              }
            }

          while (x < 100) {
            await sleep(10)
            drawObjects.barActive.bonus += (wantedBonus-drawObjects.barActive.bonus) * 0.07
            drawObjects.barActive.valueMulti = 2.5+drawObjects.barActive.bonus
            drawObjects.barText.y += (410-drawObjects.barText.y) * 0.07
            drawObjects.barMulti.y += (393-drawObjects.barMulti.y) * 0.07
            drawObjects.progressActive.width += (45-drawObjects.progressActive.width) * 0.07

            x += 1
          }
          drawObjects.barActive.active = true
        }


      });

      

      
    </script>
    <canvas id="gameCanvas"></canvas>
  </body>
</html>
