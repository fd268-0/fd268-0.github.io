        class Bar {
        constructor(start, end, color, mult, isBar) {
          this.start = start
          this.end = end
          this.color = color
          this.mult = mult
          this.isBar = isBar

          this.startingAm = end-start
          this.dir = 1
          if (isBar) {
            this.sBar = true
          }
        }

        draw() {
          ctx.fillStyle = this.color
          if (this.isBar) {
            ctx.globalCompositeOperation = "source-over"
            ctx.fillStyle = "#ffffff"
            ctx.fillRect(this.start-10, 0, 20, 100)

            ctx.fillStyle = this.color
            ctx.fillRect(this.start-5, 10, 10, 80)
          } else {
            ctx.globalCompositeOperation = "destination-over"
            if (this.end-this.start > 0) {
              ctx.fillRect(this.start, 10, this.end-this.start, 80)
            }
          }
        }

        colOn() {
          var cobj = bars.elim
          var cnm = "elim"
          for (var i = 0; i < Object.keys(bars).length; i++) {
            var inf = bars[Object.keys(bars)[i]]

            if (inf != this) {
              if (inf.mult > cobj.mult && inf.start < this.start && inf.end > this.start) {
                cobj = inf
                cnm = Object.keys(bars)[i]
              }
            }
          }
          return [cobj, cnm]
        }
      }

        async function start() {
          active = true
          bars.bar.start = 0
          for (var i = 0; i < Object.keys(bars).length; i++) {
            var j = bars[Object.keys(bars)[i]]
            var chng = j.startingAm

            if (j.mult > 0) {
              chng = chng * (data.size+data.tempsize)
            }

            if (data[`temp${Object.keys(bars)[i]} Size`]) {
              chng += j.startingAm * (data[`temp${Object.keys(bars)[i]} Size`])
            }
            if (data[`${Object.keys(bars)[i]} Size`]) {
              chng += j.startingAm * (data[`${Object.keys(bars)[i]} Size`])
            }

            

            j.start = Math.random()*(1000-(chng))
            j.end = j.start+chng

          }
        }

        function lerp(a, b, t) {
  return a + (b - a) * t;
}

        function updBoostDescs() {
          var values = new Object()
          var val2 = new Object()
          document.getElementById("stuff").innerHTML = ``
          for (var i = 0; i < Object.keys(data).length; i ++) {
            var key = Object.keys(data)[i]
            var val = data[key]
            if (key.indexOf("temp") != -1) {
              key = key.substring(4)
            }
            if ( Object.keys(data)[i].indexOf("temp") != -1 && val != 0) {
              val2[key] = val
            }
            if (key.indexOf("dns") == -1) {
              if (key != "score" && key != "round" && key != "totalscore") {
                if (values[key] != null) {
                  values[key] += val
                } else {
                  values[key] = val
                }
              }
            }
          
          }

          for (var i = 0; i < Object.keys(values).length; i ++) {
            var key = Object.keys(values)[i]
            var val = values[key]
            if (val != 0) {
              var y = ""
              var z = ""
              var info = ""
              if (val2[key] != null) {
                y = `style="background-color:#aaffff55"`
                z = `<s>${Math.round((val-val2[key])*100)/100}</s> `
              }
              if (key == "gain") {
                info = "Base score from a bar.<br><font style='color:#888888'>Safe: x1</font><br><font style='color:#008800'>Good: x1.25</font><br><font style='color:#00ff00'>Excellent: x1.5</font><br><font style='color:#ffff00'>Golden: x2.5</font>"
              }
              if (key == "size") {
                info = "How big bars are."
              }
              if (key == "speed") {
                info = "How fast your bar goes."
              }
              if (key == "movement") {
                info = "How fast all bars go."
              }
              if (key.indexOf(" Size") != -1) {
                info = `How big the ${key.substring(0,key.indexOf(" Size"))} bar is.`
              }
              if (key.indexOf(" Gain") != -1) {
                info = `Adds to the score from the ${key.substring(0,key.indexOf(" Gain"))} bar.`
              }
              if (key.indexOf(" Movement") != -1) {
                info = `Adds to the speed the ${key.substring(0,key.indexOf(" Movement"))} bar goes.`
              }
               document.getElementById("stuff").innerHTML += ` <button ${y} class="tooltip"><font style="color:#009999">${z}</font>${Math.round(((val))*100)/100} ${key.substring(0,1).toUpperCase()}${key.substring(1)}<span class="tooltiptext">${info}</span></button>`
            }
          }
        }

        async function frame(dt) {
          var fps = 1/(dt/1000)
          var wT = 60/fps
          if (wT > 10) {
            wT = 10
          }
          bars.bar.color = bars.bar.colOn()[0].color
          rs = lerp(rs, data.score+data.tempscore, 0.1)
          var m = "".padEnd(5-Math.round(rs).toString().length, "0")
          var m2 = "".padEnd(3-Math.round(data.round).toString().length, "0")
          document.getElementById("score").innerHTML = `<font style="color:#666666">${m}</font>${Math.round(rs)}`
          document.getElementById("round").innerHTML = `<font style="color:#666666">${m2}</font>${Math.round(data.round)}`
        

          if (active) {
            bars.bar.start += Math.max(0.5,(data.speed+data.tempspeed))*(bars.bar.dir)*(wT)

            for (var i = 0; i < Object.keys(bars).length; i++) {
              var item = bars[Object.keys(bars)[i]]
              if (Object.keys(bars)[i] != "bar") {
                var am = 0
                if (data[`temp${Object.keys(bars)[i]} Movement`]) {
                  am += (data[`temp${Object.keys(bars)[i]} Movement`])
                }
                if (data[`${Object.keys(bars)[i]} Movement`]) {
                  am += (data[`${Object.keys(bars)[i]} Movement`])
                }
                item.start = item.start + Math.max(0,(data.movement+data.tempmovement+am))*item.dir*(wT)
                item.end = item.end + Math.max(0,(data.movement+data.tempmovement+am))*item.dir*(wT)
                if (item.end > 1000) {
                  item.dir = -1
                }
                if (item.start < 0) {
                  item.dir = 1
                }
              }
            }

          if (bars.bar.start > 990) {
            bars.bar.start = 990
            bars.bar.dir = -1
          }
           if (bars.bar.start < 10) {
            bars.bar.start = 10
            bars.bar.dir = 1
          }

          }
        }

        var lastUpdate = Date.now();

        async function calc() {
          var now = Date.now();
          var dt = now - lastUpdate;
          lastUpdate = now;
          frame(dt)
          setTimeout(calc, 1);
        }

        calc()
